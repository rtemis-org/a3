name: Publish to JSR

on:
  push:
    branches:
      - main
    paths:
      - typescript/jsr.json
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for OIDC provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: typescript/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Publish
        run: deno publish
