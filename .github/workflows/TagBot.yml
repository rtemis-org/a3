name: TagBot

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:

jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest

    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          subdir: julia/RtemisA3
          # If you later add a deploy key or PAT, uncomment/configure one of
          # these to let TagBot handle commits that touch workflow files too.
          # ssh: ${{ secrets.DOCUMENTER_KEY }}
          # changelog_format: github
