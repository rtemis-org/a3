name: typescript-ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: typescript-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: typescript

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: typescript/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test
